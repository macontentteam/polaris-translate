[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."claude-proxy"]
  timeout = 60

[functions."openai-audit"]
  timeout = 60

[functions."kb-upload"]
  timeout = 120

[[redirects]]
  from = "/api/claude-proxy"
  to = "/.netlify/functions/claude-proxy"
  status = 200

[[redirects]]
  from = "/api/openai-audit"
  to = "/.netlify/functions/openai-audit"
  status = 200

[[redirects]]
  from = "/api/kb-upload"
  to = "/.netlify/functions/kb-upload"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
